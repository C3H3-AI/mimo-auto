name: MiMo Code
version: 1.0.0
slug: mimo-code
description: MiMo AI serve add-on for Home Assistant — powering mimo_auto integration
url: https://github.com/C3H3-AI/mimo-auto
arch:
  - aarch64
  - amd64
  - armv7
init: false
ingress: false
host_network: true
apparmor: false
