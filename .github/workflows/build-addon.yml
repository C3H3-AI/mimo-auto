name: Build Add-on

on:
  push:
    tags:
      - "v*"

env:
  ADDON_SLUG: mimo-code

jobs:
  # ============================================================
  # Build and release the HACS integration (mimo_auto.zip)
  # ============================================================
  release-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create integration zip
        run: |
          cd custom_components/mimo_auto
          zip -r ../../mimo_auto.zip ./
          cd ../../

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "See CHANGELOG.md for details" \
            "mimo_auto.zip"

  # ============================================================
  # Build and push the add-on Docker images
  # ============================================================
  build-addon:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [aarch64, amd64, armv7]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build add-on image (${{ matrix.arch }})
        uses: home-assistant/builder@2024.01.0
        with:
          args: |
            --${{ matrix.arch }} \
            --target /data \
            --image "ghcr.io/${{ github.repository_owner }}/${{ env.ADDON_SLUG }}" \
            --docker-hub "ghcr.io/${{ github.repository_owner }}" \
            --addon "${{ env.ADDON_SLUG }}" \
            --version "${{ steps.version.outputs.version }}"