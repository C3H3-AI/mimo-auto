<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiMo Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--primary-background-color, #f0f4f8);
    color: var(--primary-text-color, #1a1a2e);
    height: 100vh; display: flex; flex-direction: column;
  }
  .header {
    background: var(--app-header-background-color, #1a1a2e);
    color: var(--app-header-text-color, #fff);
    padding: 16px 20px; font-size: 18px; font-weight: 600;
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  .header svg { width: 24px; height: 24px; fill: currentColor; }
  .header span { font-size: 13px; opacity: 0.7; font-weight: 400; }
  .messages {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .msg { max-width: 80%; padding: 12px 16px; border-radius: 16px; line-height: 1.5; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
  .msg.user { align-self: flex-end; background: var(--accent-color, #4a6cf7); color: #fff; border-bottom-right-radius: 4px; }
  .msg.bot { align-self: flex-start; background: var(--secondary-background-color, #e8edf2); color: var(--primary-text-color, #1a1a2e); border-bottom-left-radius: 4px; }
  .msg.error { align-self: flex-start; background: #fde8e8; color: #c53030; }
  .thinking {
    align-self: flex-start; display: flex; gap: 4px; padding: 16px 20px;
    background: var(--secondary-background-color, #e8edf2);
    border-radius: 16px; border-bottom-left-radius: 4px;
  }
  .thinking span {
    width: 8px; height: 8px; background: var(--secondary-text-color, #888);
    border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both;
  }
  .thinking span:nth-child(1) { animation-delay: -0.32s; }
  .thinking span:nth-child(2) { animation-delay: -0.16s; }
  @keyframes bounce { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }
  .input-area {
    padding: 12px 16px 16px; display: flex; gap: 8px;
    background: var(--primary-background-color, #f0f4f8); flex-shrink: 0;
  }
  .input-area input {
    flex: 1; padding: 12px 16px; border: 1px solid var(--divider-color, #d0d5dd);
    border-radius: 24px; font-size: 14px; outline: none;
    background: var(--card-background-color, #fff);
    color: var(--primary-text-color, #1a1a2e);
  }
  .input-area input:focus { border-color: var(--accent-color, #4a6cf7); }
  .input-area button {
    width: 44px; height: 44px; border: none; border-radius: 50%;
    background: var(--accent-color, #4a6cf7); color: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: opacity .2s;
  }
  .input-area button:disabled { opacity: 0.4; cursor: not-allowed; }
  .input-area button svg { width: 20px; height: 20px; fill: currentColor; }
  .welcome {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; color: var(--secondary-text-color, #888); gap: 8px;
    text-align: center; padding: 20px;
  }
  .welcome svg { width: 48px; height: 48px; opacity: 0.4; }
</style>
</head>
<body>
<div class="header">
  <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12c0 4.42 2.65 8.17 6.35 9.95-.1-.77-.18-1.95.02-2.78.18-.78.98-2.13.98-2.13s-.25-.5-.25-1.24c0-1.16.68-2.03 1.52-2.03.72 0 1.07.54 1.07 1.18 0 .72-.46 1.8-.69 2.8-.2.84.42 1.53 1.25 1.53 1.5 0 2.66-1.58 2.66-3.87 0-2.02-1.45-3.44-3.53-3.44-2.4 0-3.82 1.8-3.82 3.66 0 .72.28 1.5.63 1.93.07.08.08.16.06.25-.06.26-.2.84-.23.96-.04.16-.12.2-.28.12-.74-.35-2.1-1.28-2.52-1.82-.62-.82-1.1-2.03-.67-3.5.1-.34.23-.66.39-.95C4.52 8.27 6.04 6 9.1 6c2.12 0 3.78 1.52 3.78 3.54 0 2.52-1.58 4.55-3.78 4.55-.74 0-1.43-.39-1.67-.84l-.45 1.74c-.16.61-.6 1.38-.9 1.85 1.02.3 2.07.47 3.14.47 5.52 0 10-4.48 10-10S17.52 2 12 2z"/></svg>
  MiMo Chat <span>MiMo Auto</span>
</div>
<div id="messages" class="messages">
  <div class="welcome" id="welcome">
    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/></svg>
    <div>开始和 MiMo 对话</div>
    <div style="font-size:13px">输入消息后按 Enter 发送</div>
  </div>
</div>
<div class="input-area">
  <input id="input" type="text" placeholder="输入消息..." autofocus>
  <button id="sendBtn" disabled><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
</div>
<script>
const API = window.location.origin.replace(/:(\d+)$/, ':14096');
let sessionId = null;
let loading = false;

const $ = id => document.getElementById(id);
const msgArea = $('messages');
const input = $('input');
const sendBtn = $('sendBtn');
const welcome = $('welcome');

function addMsg(text, type) {
  welcome && (welcome.style.display = 'none');
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  div.textContent = text;
  msgArea.appendChild(div);
  msgArea.scrollTop = msgArea.scrollHeight;
  return div;
}

function showThinking() {
  const div = document.createElement('div');
  div.className = 'thinking';
  div.id = 'thinking';
  div.innerHTML = '<span></span><span></span><span></span>';
  msgArea.appendChild(div);
  msgArea.scrollTop = msgArea.scrollHeight;
}

function hideThinking() {
  const el = $('thinking');
  el && el.remove();
}

async function createSession() {
  const r = await fetch(API + '/session', { method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}' });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const data = await r.json();
  return data.id;
}

async function sendMessage(sid, text) {
  const r = await fetch(API + '/session/' + sid + '/message', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({message: text, parts:[{type:'text',text:text}]})
  });
  if (!r.ok) { const t = await r.text(); throw new Error(t || 'HTTP ' + r.status); }
  const ct = r.headers.get('Content-Type') || '';
  let reply = '';
  if (ct.includes('json') && !ct.includes('chunked')) {
    const data = await r.json();
    reply = extractText(data);
  } else {
    reply = await parseJsonStream(r);
  }
  return reply;
}

function extractText(data) {
  const parts = data.parts || [];
  return parts.filter(p => p.type === 'text').map(p => p.text).join('\n');
}

async function parseJsonStream(response) {
  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let buf = '', texts = [];
  while (true) {
    const {done, value} = await reader.read();
    if (done) break;
    buf += decoder.decode(value, {stream: true});
    while (true) {
      buf = buf.trimStart();
      if (!buf) break;
      try {
        const obj = JSON.parse(buf);
        buf = '';
        const info = obj.info || {};
        if (info.role === 'assistant' && info.finish === 'stop') {
          (obj.parts || []).filter(p => p.type === 'text').forEach(p => texts.push(p.text));
        }
      } catch { break; }
    }
  }
  return texts.join('\n');
}

async function handleSend() {
  const text = input.value.trim();
  if (!text || loading) return;
  input.value = '';
  addMsg(text, 'user');
  showThinking();
  loading = true;
  sendBtn.disabled = true;
  try {
    if (!sessionId) sessionId = await createSession();
    const reply = await sendMessage(sessionId, text);
    hideThinking();
    if (reply) addMsg(reply, 'bot');
    else addMsg('（未收到回复）', 'error');
  } catch (err) {
    hideThinking();
    addMsg('连接失败: ' + err.message, 'error');
    sessionId = null;
  }
  loading = false;
  sendBtn.disabled = false;
  input.focus();
}

input.addEventListener('keydown', e => { if (e.key === 'Enter') handleSend(); });
sendBtn.addEventListener('click', handleSend);
input.addEventListener('input', () => { sendBtn.disabled = !input.value.trim(); });
</script>
</body>
</html>
