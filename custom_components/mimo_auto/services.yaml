---
chat:
  name: Chat
  description: Send a message to MiMo Auto and get a response.
  fields:
    message:
      name: Message
      description: The message to send to MiMo Auto.
      required: true
      example: "Hello, how are you?"
      selector:
        text:
          multiline: true
    session_id:
      name: Session ID
      description: Optional session ID to continue a previous conversation.
      required: false
      example: "ses_abc123"
      selector:
        text:
