name: MiMo Code
version: 4.1.0
slug: mimo-code
description: MiMo Code AI Server — 通过飞书/微信远程控制与维护 Home Assistant
url: https://github.com/C3H3-AI/mimo-auto
arch:
  - aarch64
  - amd64
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:chat-processing
panel_title: MiMo Code
ports:
  14096/tcp: 14096
  8099/tcp: null
ports_description:
  14096/tcp: MiMo AI API
  8099/tcp: Web UI (通道管理，通过 ingress 访问)
startup: application
boot: auto
watchdog: http://[HOST]:[PORT:8099]/healthcheck
map:
  - config:rw
options:
  port: 14096
  feishu_enabled: false
  feishu_mode: ws
  feishu_app_id: ""
  feishu_app_secret: ""
  feishu_verification_token: ""
  feishu_encrypt_key: ""
  wechat_enabled: false
  wechat_corp_id: ""
  wechat_agent_id: ""
  wechat_secret: ""
  wechat_token: ""
  wechat_encoding_aes_key: ""
  personal_wechat_enabled: false
  ha_mcp_url: ""
  mimo_version: ""
schema:
  port: int(1024,65535)
  feishu_enabled: bool
  feishu_mode: list(ws|webhook)?
  feishu_app_id: str
  feishu_app_secret: str
  feishu_verification_token: str
  feishu_encrypt_key: str
  wechat_enabled: bool
  wechat_corp_id: str
  wechat_agent_id: str
  wechat_secret: str
  wechat_token: str
  wechat_encoding_aes_key: str
  personal_wechat_enabled: bool
  ha_mcp_url: str?
  mimo_version: str?
