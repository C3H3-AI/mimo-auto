<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>MiMo Code</title>
<style>
  :root {
    --bg: #1c1c1e;
    --surface: #2c2c2e;
    --surface2: #3a3a3c;
    --border: #48484a;
    --text: #f5f5f7;
    --text2: #a1a1a6;
    --accent: #0a84ff;
    --accent2: #5e5ce6;
    --green: #30d158;
    --red: #ff453a;
    --orange: #ff9f0a;
    --radius: 10px;
    --shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text); height: 100vh; overflow: hidden;
  }
  .app { display: flex; height: 100vh; }
  .sidebar {
    width: 280px; background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  .sidebar-header {
    padding: 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .sidebar-header h1 { font-size: 16px; font-weight: 600; }
  .sidebar-header .badge {
    font-size: 11px; background: var(--accent); color: #fff;
    padding: 2px 8px; border-radius: 10px;
  }
  .session-list { flex: 1; overflow-y: auto; padding: 8px; }
  .session-item {
    padding: 10px 12px; border-radius: 8px; cursor: pointer;
    margin-bottom: 4px; transition: background 0.15s;
    display: flex; align-items: center; gap: 8px;
  }
  .session-item:hover { background: var(--surface2); }
  .session-item.active { background: var(--accent); color: #fff; }
  .session-item .dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    background: var(--text2);
  }
  .session-item.active .dot { background: #fff; }
  .session-item .info { flex: 1; min-width: 0; }
  .session-item .title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .session-item .meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .session-item.active .meta { color: rgba(255,255,255,0.7); }
  .new-session-btn {
    margin: 8px; padding: 10px; border-radius: 8px; border: 1px dashed var(--border);
    background: transparent; color: var(--text2); cursor: pointer; font-size: 13px;
    transition: all 0.15s;
  }
  .new-session-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(10,132,255,0.08); }

  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .chat-header {
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .chat-header .info h2 { font-size: 16px; font-weight: 600; }
  .chat-header .info .sub { font-size: 12px; color: var(--text2); }
  .header-actions { display: flex; gap: 8px; }
  .btn {
    padding: 6px 14px; border-radius: 6px; border: none;
    font-size: 12px; cursor: pointer; transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-danger:hover { opacity: 0.85; }
  .btn-ghost { background: var(--surface2); color: var(--text); }
  .btn-ghost:hover { background: var(--border); }

  .messages { flex: 1; overflow-y: auto; padding: 20px; }
  .message { margin-bottom: 16px; display: flex; gap: 12px; }
  .message.assistant { flex-direction: row; }
  .message.user { flex-direction: row-reverse; }
  .message .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  .message.user .avatar { background: var(--accent); }
  .message.assistant .avatar { background: var(--accent2); }
  .message .bubble {
    max-width: 75%; padding: 10px 14px; border-radius: 14px;
    font-size: 14px; line-height: 1.5;
  }
  .message.user .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .message.assistant .bubble { background: var(--surface2); border-bottom-left-radius: 4px; }
  .message .bubble pre {
    background: rgba(0,0,0,0.3); padding: 8px 12px; border-radius: 6px;
    overflow-x: auto; font-size: 13px; margin: 8px 0;
  }
  .message .bubble code { font-size: 13px; }
  .message .time { font-size: 11px; color: var(--text2); margin-top: 4px; }

  .input-area {
    padding: 16px 20px; border-top: 1px solid var(--border);
    display: flex; gap: 10px; align-items: flex-end;
  }
  .input-area textarea {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px; color: var(--text);
    font-size: 14px; font-family: inherit; resize: none;
    min-height: 42px; max-height: 120px; outline: none;
  }
  .input-area textarea:focus { border-color: var(--accent); }
  .input-area .send-btn {
    width: 42px; height: 42px; border-radius: 50%; border: none;
    background: var(--accent); color: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0; transition: 0.15s;
  }
  .input-area .send-btn:hover { opacity: 0.85; }
  .input-area .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .empty-state {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; color: var(--text2); gap: 12px;
  }
  .empty-state .icon { font-size: 48px; opacity: 0.3; }
  .empty-state h3 { font-size: 18px; color: var(--text); }
  .empty-state p { font-size: 14px; text-align: center; max-width: 320px; }

  .loading { display: flex; align-items: center; justify-content: center; padding: 40px; }
  .spinner {
    width: 24px; height: 24px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed; bottom: 24px; right: 24px; padding: 12px 20px;
    border-radius: 8px; color: #fff; font-size: 13px; z-index: 1000;
    animation: slideIn 0.3s ease;
  }
  .toast.success { background: var(--green); }
  .toast.error { background: var(--red); }
  @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .welcome-message {
    margin-bottom: 20px; padding: 16px; background: var(--surface);
    border-radius: var(--radius); font-size: 14px; line-height: 1.6; color: var(--text2);
    text-align: center;
  }

  .settings-panel {
    padding: 24px; overflow-y: auto; flex: 1;
  }
  .settings-panel h2 { font-size: 18px; margin-bottom: 16px; }
  .setting-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px; background: var(--surface); border-radius: 8px;
    margin-bottom: 8px;
  }
  .setting-row .label { font-size: 14px; }
  .setting-row .value { font-size: 13px; color: var(--text2); }

  @media (max-width: 768px) {
    .sidebar { width: 60px; }
    .sidebar .session-item .info { display: none; }
    .sidebar-header h1 { display: none; }
    .message .bubble { max-width: 85%; }
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <span style="font-size:20px">&#x1F916;</span>
      <h1>MiMo</h1>
      <span class="badge">v2.1</span>
    </div>
    <button class="new-session-btn" onclick="createSession()">+ New Session</button>
    <div class="session-list" id="sessionList"></div>
  </aside>

  <main class="main">
    <div class="chat-header">
      <div class="info">
        <h2 id="currentTitle">MiMo Code</h2>
        <div class="sub" id="currentSub">Select a session to start chatting</div>
      </div>
      <div class="header-actions">
        <button class="btn btn-ghost" onclick="refreshSessions()">Refresh</button>
        <button class="btn btn-danger" id="deleteBtn" onclick="deleteSession()" style="display:none">Delete</button>
      </div>
    </div>

    <div id="messages" class="messages">
      <div class="empty-state">
        <div class="icon">&#x1F916;</div>
        <h3>Welcome to MiMo Code</h3>
        <p>Select a session from the sidebar or create a new one to start interacting with your AI assistant.</p>
      </div>
    </div>

    <div class="input-area" id="inputArea" style="display:none">
      <textarea id="chatInput" rows="1" placeholder="Type a message..." onkeydown="handleKeyDown(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">&#x2191;</button>
    </div>
  </main>
</div>

<script>
let sessions = [];
let currentSession = null;
let loading = false;

const API = '/api';

function $(id) { return document.getElementById(id); }

function toast(msg, type) {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

async function api(path, opts = {}) {
  const url = API + path;
  const res = await fetch(url, {
    method: opts.method || 'GET',
    headers: opts.body ? { 'Content-Type': 'application/json' } : {},
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok) {
    const text = await res.text();
    let msg = text;
    try { msg = JSON.parse(text).error || JSON.parse(text).message || text; } catch(e) {}
    throw new Error(msg);
  }
  const text = await res.text();
  if (!text) return null;
  try { return JSON.parse(text); } catch(e) { return text; }
}

async function loadSessions() {
  try {
    const data = await api('/session');
    sessions = data.sessions || data || [];
    renderSessions();
  } catch(e) {
    console.error('Failed to load sessions:', e);
  }
}

function renderSessions() {
  const list = $('sessionList');
  if (!sessions.length) {
    list.innerHTML = '<div style="text-align:center;color:var(--text2);padding:20px;font-size:13px">No sessions yet</div>';
    return;
  }
  list.innerHTML = sessions.map(s => {
    const id = s.id || s.slug;
    const title = s.title || s.slug || 'Untitled';
    const active = currentSession && (currentSession.id === id || currentSession.slug === id) ? 'active' : '';
    const time = s.time ? new Date(s.time.created || s.time).toLocaleString() : '';
    return `<div class="session-item ${active}" data-id="${id}" onclick="selectSession('${id}')">
      <div class="dot"></div>
      <div class="info">
        <div class="title">${title}</div>
        <div class="meta">${time}</div>
      </div>
    </div>`;
  }).join('');
}

async function selectSession(id) {
  try {
    currentSession = sessions.find(s => (s.id || s.slug) === id);
    if (!currentSession) {
      const data = await api('/session/' + id);
      currentSession = data;
    }
    const title = currentSession.title || currentSession.slug || 'Session';
    $('currentTitle').textContent = title;
    $('currentSub').textContent = 'Session active';
    $('deleteBtn').style.display = '';
    $('inputArea').style.display = '';
    renderSessions();
    loadMessages();
    $('chatInput').focus();
  } catch(e) {
    toast('Failed to load session: ' + e.message, 'error');
  }
}

async function loadMessages() {
  const container = $('messages');
  container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const sessionId = currentSession.id || currentSession.slug;
    const data = await api('/session/' + sessionId + '/message');
    const msgs = data.messages || data || [];
    renderMessages(msgs);
  } catch(e) {
    container.innerHTML = '<div class="empty-state"><p style="color:var(--text2)">No messages yet. Start a conversation!</p></div>';
  }
}

function renderMessages(msgs) {
  const container = $('messages');
  if (!msgs || !msgs.length) {
    container.innerHTML = `<div class="welcome-message">
      <p>Start a conversation with MiMo Code. Ask questions, control your home, or explore AI capabilities.</p>
    </div>`;
    return;
  }
  container.innerHTML = msgs.map(m => {
    const role = m.role || m.author || 'assistant';
    const content = m.content || m.text || '';
    const time = m.time ? new Date(m.time).toLocaleTimeString() : '';
    const formatted = formatContent(content);
    return `<div class="message ${role}">
      <div class="avatar">${role === 'user' ? '&#x1F464;' : '&#x1F916;'}</div>
      <div class="bubble">${formatted}<div class="time">${time}</div></div>
    </div>`;
  }).join('');
  container.scrollTop = container.scrollHeight;
}

function formatContent(text) {
  if (!text) return '';
  const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const withCode = escaped.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  const withInline = withCode.replace(/`([^`]+)`/g, '<code>$1</code>');
  const withNewlines = withInline.replace(/\n/g, '<br>');
  return withNewlines;
}

async function sendMessage() {
  const input = $('chatInput');
  const text = input.value.trim();
  if (!text || loading) return;

  if (!currentSession) {
    toast('Please select a session first', 'error');
    return;
  }

  const sessionId = currentSession.id || currentSession.slug;
  input.value = '';
  loading = true;
  $('sendBtn').disabled = true;

  const container = $('messages');
  const empty = container.querySelector('.empty-state, .welcome-message');
  if (empty) container.innerHTML = '';

  container.insertAdjacentHTML('beforeend', `<div class="message user">
    <div class="avatar">&#x1F464;</div>
    <div class="bubble">${formatContent(text)}</div>
  </div>`);
  container.scrollTop = container.scrollHeight;

  const loadingId = 'loading-' + Date.now();
  container.insertAdjacentHTML('beforeend', `<div class="message assistant" id="${loadingId}">
    <div class="avatar">&#x1F916;</div>
    <div class="bubble"><div class="spinner" style="width:16px;height:16px;margin:4px 0"></div></div>
  </div>`);
  container.scrollTop = container.scrollHeight;

  try {
    const result = await api('/session/' + sessionId + '/message', {
      method: 'POST',
      body: { message: text, parts: [{ type: 'text', text: text }] }
    });
    const loader = $(loadingId);
    if (loader) loader.remove();
    const reply = result.response || result.message || result.text || JSON.stringify(result);
    container.insertAdjacentHTML('beforeend', `<div class="message assistant">
      <div class="avatar">&#x1F916;</div>
      <div class="bubble">${formatContent(reply)}</div>
    </div>`);
    container.scrollTop = container.scrollHeight;
    loadSessions();
  } catch(e) {
    const loader = $(loadingId);
    if (loader) loader.remove();
    container.insertAdjacentHTML('beforeend', `<div class="message assistant">
      <div class="avatar">&#x1F916;</div>
      <div class="bubble" style="color:var(--red)">Error: ${e.message}</div>
    </div>`);
  }

  loading = false;
  $('sendBtn').disabled = false;
  input.focus();
}

async function createSession() {
  try {
    const data = await api('/session', { method: 'POST', body: {} });
    toast('Session created', 'success');
    await loadSessions();
    const id = data.id || data.slug;
    if (id) selectSession(id);
  } catch(e) {
    toast('Failed to create session: ' + e.message, 'error');
  }
}

async function deleteSession() {
  if (!currentSession) return;
  if (!confirm('Delete this session?')) return;
  try {
    const id = currentSession.id || currentSession.slug;
    await api('/session/' + id, { method: 'DELETE' });
    currentSession = null;
    $('currentTitle').textContent = 'MiMo Code';
    $('currentSub').textContent = 'Select a session to start chatting';
    $('deleteBtn').style.display = 'none';
    $('inputArea').style.display = 'none';
    $('messages').innerHTML = '<div class="empty-state"><div class="icon">&#x1F916;</div><h3>Welcome to MiMo Code</h3><p>Select a session from the sidebar or create a new one.</p></div>';
    toast('Session deleted', 'success');
    await loadSessions();
  } catch(e) {
    toast('Failed to delete: ' + e.message, 'error');
  }
}

function handleKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

async function refreshSessions() {
  await loadSessions();
  toast('Refreshed', 'success');
}

loadSessions();
setInterval(loadSessions, 30000);
</script>
</body>
</html>
