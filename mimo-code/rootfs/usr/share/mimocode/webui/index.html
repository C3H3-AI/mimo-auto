<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MiMo Code</title>
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #242424;
  --surface3: #2a2a2a;
  --border: #333333;
  --text: #e5e5e5;
  --text2: #888888;
  --text3: #666666;
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --accent-bg: rgba(99,102,241,0.1);
  --green: #22c55e;
  --green-bg: rgba(34,197,94,0.1);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,0.1);
  --orange: #f97316;
  --yellow: #eab308;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-xs: 6px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
  --sidebar-w: 280px;
  --header-h: 56px;
  --input-h: 120px;
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
}
[data-theme="light"] {
  --bg: #f8f9fa;
  --surface: #ffffff;
  --surface2: #f1f3f5;
  --surface3: #e9ecef;
  --border: #dee2e6;
  --text: #212529;
  --text2: #6c757d;
  --text3: #adb5bd;
  --accent: #4f46e5;
  --accent-hover: #6366f1;
  --accent-bg: rgba(79,70,229,0.08);
  --green: #16a34a;
  --green-bg: rgba(22,163,74,0.08);
  --red: #dc2626;
  --red-bg: rgba(220,38,38,0.08);
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
}
[data-theme="dracula"] {
  --bg: #282a36;
  --surface: #44475a;
  --surface2: #6272a4;
  --surface3: #5a5e7a;
  --border: #6272a4;
  --text: #f8f8f2;
  --text2: #bd93f9;
  --text3: #ff79c6;
  --accent: #50fa7b;
  --accent-hover: #69ff94;
  --accent-bg: rgba(80,250,123,0.1);
  --green: #50fa7b;
  --green-bg: rgba(80,250,123,0.1);
  --red: #ff5555;
  --red-bg: rgba(255,85,85,0.1);
  --orange: #ffb86c;
  --yellow: #f1fa8c;
}
[data-theme="nord"] {
  --bg: #2e3440;
  --surface: #3b4252;
  --surface2: #434c5e;
  --surface3: #4c566a;
  --border: #4c566a;
  --text: #eceff4;
  --text2: #d8dee9;
  --text3: #a3b1c4;
  --accent: #88c0d0;
  --accent-hover: #8fbcbb;
  --accent-bg: rgba(136,192,208,0.15);
  --green: #a3be8c;
  --green-bg: rgba(163,190,140,0.15);
  --red: #bf616a;
  --red-bg: rgba(191,97,106,0.15);
  --orange: #d08770;
  --yellow: #ebcb8b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.5;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}
::selection { background: var(--accent); color: #fff; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }

/* Layout */
.app { display: flex; height: 100vh; overflow: hidden; }

/* Sidebar */
.sidebar {
  width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0; transition: width var(--transition), transform var(--transition);
}
.sidebar-header {
  padding: 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.sidebar-brand { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.sidebar-logo {
  width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), var(--accent-hover));
  border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0; color: #fff;
}
.sidebar-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-version { font-size: 11px; color: var(--text2); background: var(--surface2); padding: 2px 8px; border-radius: 10px; }
.new-session-btn {
  width: 32px; height: 32px; border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: transparent; color: var(--text2); cursor: pointer; display: flex; align-items: center;
  justify-content: center; font-size: 18px; transition: all var(--transition); flex-shrink: 0;
}
.new-session-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

.search-wrapper { padding: 12px 16px; }
.search-input {
  width: 100%; padding: 10px 12px 10px 36px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--surface2); color: var(--text);
  font-size: 13px; outline: none; transition: all var(--transition);
}
.search-input:focus { border-color: var(--accent); background: var(--bg); }
.search-icon { position: absolute; left: 28px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 14px; pointer-events: none; }
.search-wrapper { position: relative; }

.session-list { flex: 1; overflow-y: auto; padding: 8px; }
.session-item {
  padding: 12px; border-radius: var(--radius-sm); cursor: pointer; margin-bottom: 4px;
  transition: all var(--transition); position: relative; group: session;
}
.session-item:hover { background: var(--surface2); }
.session-item.active { background: var(--accent-bg); border: 1px solid var(--accent); }
.session-item .title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 24px; }
.session-item .meta { font-size: 11px; color: var(--text3); margin-top: 4px; display: flex; align-items: center; gap: 8px; }
.session-item .delete-btn {
  position: absolute; top: 12px; right: 8px; width: 24px; height: 24px;
  border-radius: var(--radius-xs); border: none; background: transparent;
  color: var(--text3); cursor: pointer; display: none; align-items: center;
  justify-content: center; font-size: 14px; transition: all var(--transition);
}
.session-item:hover .delete-btn { display: flex; }
.session-item .delete-btn:hover { background: var(--red-bg); color: var(--red); }

.sidebar-footer {
  padding: 12px 16px; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.sidebar-footer-btn {
  flex: 1; padding: 8px; border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: transparent; color: var(--text2); cursor: pointer; font-size: 12px;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: all var(--transition);
}
.sidebar-footer-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }

.chat-header {
  height: var(--header-h); padding: 0 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; background: var(--surface);
  flex-shrink: 0; z-index: 10;
}
.header-info { flex: 1; min-width: 0; }
.header-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.header-sub { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 8px; }
.header-status { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.header-status.offline { background: var(--red); }

.header-toolbar { display: flex; gap: 8px; align-items: center; }
.toolbar-select {
  padding: 6px 10px; border-radius: var(--radius-xs); border: 1px solid var(--border);
  background: var(--surface2); color: var(--text); font-size: 12px; cursor: pointer;
  outline: none; transition: all var(--transition); max-width: 160px;
}
.toolbar-select:focus { border-color: var(--accent); }
.toolbar-btn {
  width: 36px; height: 36px; border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: transparent; color: var(--text2); cursor: pointer; display: flex;
  align-items: center; justify-content: center; font-size: 16px; transition: all var(--transition);
}
.toolbar-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
.toolbar-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Messages */
.messages-container { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
.messages { max-width: 800px; margin: 0 auto; padding: 20px; }

.welcome-screen {
  flex: 1; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px; padding: 40px; text-align: center;
}
.welcome-icon {
  width: 80px; height: 80px; background: linear-gradient(135deg, var(--accent), var(--accent-hover));
  border-radius: 24px; display: flex; align-items: center; justify-content: center;
  font-size: 40px; box-shadow: 0 8px 32px rgba(99,102,241,0.3);
}
.welcome-title { font-size: 24px; font-weight: 600; margin-top: 8px; }
.welcome-subtitle { font-size: 14px; color: var(--text2); max-width: 400px; line-height: 1.6; }
.welcome-shortcuts { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; justify-content: center; }
.shortcut-item {
  display: flex; align-items: center; gap: 8px; padding: 8px 12px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 12px; color: var(--text2);
}
.shortcut-item kbd {
  padding: 2px 6px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 4px; font-family: var(--font-mono); font-size: 11px;
}

.message { margin-bottom: 20px; display: flex; gap: 12px; animation: messageIn 0.3s ease; }
@keyframes messageIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.message.user { flex-direction: row-reverse; }
.message .avatar {
  width: 36px; height: 36px; border-radius: var(--radius-sm); display: flex;
  align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;
}
.message.user .avatar { background: linear-gradient(135deg, var(--accent), var(--accent-hover)); color: #fff; }
.message.assistant .avatar { background: var(--surface2); border: 1px solid var(--border); }
.message .content { flex: 1; min-width: 0; max-width: calc(100% - 48px); }
.message .bubble {
  padding: 12px 16px; border-radius: var(--radius); font-size: 14px; line-height: 1.6;
  word-wrap: break-word; overflow-wrap: break-word;
}
.message.user .bubble {
  background: var(--accent); color: #fff; border-bottom-right-radius: var(--radius-xs);
  display: inline-block; max-width: 80%;
}
.message.assistant .bubble {
  background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: var(--radius-xs);
}
.message .meta { font-size: 11px; color: var(--text3); margin-top: 6px; display: flex; align-items: center; gap: 8px; }
.message.user .meta { justify-content: flex-end; }
.message .actions { display: flex; gap: 4px; opacity: 0; transition: opacity var(--transition); }
.message:hover .actions { opacity: 1; }
.msg-action {
  padding: 4px 8px; border-radius: var(--radius-xs); border: none; background: var(--surface2);
  color: var(--text2); cursor: pointer; font-size: 11px; transition: all var(--transition);
}
.msg-action:hover { background: var(--accent-bg); color: var(--accent); }

/* Markdown Content */
.md-content h1 { font-size: 20px; font-weight: 600; margin: 16px 0 8px; }
.md-content h2 { font-size: 18px; font-weight: 600; margin: 14px 0 8px; }
.md-content h3 { font-size: 16px; font-weight: 600; margin: 12px 0 6px; }
.md-content h4 { font-size: 14px; font-weight: 600; margin: 10px 0 6px; }
.md-content p { margin: 8px 0; }
.md-content ul, .md-content ol { padding-left: 24px; margin: 8px 0; }
.md-content li { margin: 4px 0; }
.md-content blockquote {
  border-left: 3px solid var(--accent); padding: 8px 16px; margin: 12px 0;
  background: var(--accent-bg); border-radius: 0 var(--radius-xs) var(--radius-xs) 0;
}
.md-content a { color: var(--accent); text-decoration: none; }
.md-content a:hover { text-decoration: underline; }
.md-content strong { font-weight: 600; }
.md-content em { font-style: italic; }
.md-content code {
  font-family: var(--font-mono); font-size: 13px; padding: 2px 6px;
  background: var(--surface2); border-radius: 4px;
}
.md-content pre {
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 12px 16px; margin: 12px 0; overflow-x: auto; position: relative;
}
.md-content pre code { background: transparent; padding: 0; font-size: 13px; line-height: 1.5; }
.md-content .code-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 12px; background: var(--surface2); border-bottom: 1px solid var(--border);
  font-size: 12px; color: var(--text2);
}
.md-content .copy-code-btn {
  padding: 4px 8px; border-radius: var(--radius-xs); border: none;
  background: transparent; color: var(--text2); cursor: pointer; font-size: 11px;
  transition: all var(--transition);
}
.md-content .copy-code-btn:hover { background: var(--accent-bg); color: var(--accent); }
.md-content table { width: 100%; border-collapse: collapse; margin: 12px 0; }
.md-content th, .md-content td { padding: 8px 12px; border: 1px solid var(--border); text-align: left; }
.md-content th { background: var(--surface2); font-weight: 600; }
.md-content hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.md-content img { max-width: 100%; border-radius: var(--radius-sm); }

/* Tool Call Display */
.tool-call {
  margin: 8px 0; padding: 12px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-size: 13px;
}
.tool-call-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  padding-bottom: 8px; border-bottom: 1px solid var(--border);
}
.tool-call-icon { color: var(--orange); }
.tool-call-name { font-weight: 500; }
.tool-call-status { margin-left: auto; font-size: 11px; }
.tool-call-status.running { color: var(--yellow); }
.tool-call-status.done { color: var(--green); }
.tool-call-status.error { color: var(--red); }
.tool-call-content { font-family: var(--font-mono); font-size: 12px; color: var(--text2); white-space: pre-wrap; }

/* Typing Indicator */
.typing-indicator { display: flex; gap: 4px; padding: 4px 0; }
.typing-dot {
  width: 8px; height: 8px; background: var(--text3); border-radius: 50%;
  animation: typing 1.4s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-8px); opacity: 1; } }

/* Input Area */
.input-area {
  padding: 16px 20px; border-top: 1px solid var(--border); background: var(--surface);
  flex-shrink: 0;
}
.input-wrapper {
  max-width: 800px; margin: 0 auto; display: flex; gap: 12px; align-items: flex-end;
}
.input-box {
  flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px 16px; transition: all var(--transition); position: relative;
}
.input-box:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
.input-box textarea {
  width: 100%; background: transparent; border: none; color: var(--text); font-size: 14px;
  font-family: inherit; resize: none; outline: none; min-height: 24px; max-height: 150px;
  line-height: 1.5;
}
.input-box textarea::placeholder { color: var(--text3); }
.input-hint {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 8px; font-size: 11px; color: var(--text3);
}
.input-hint kbd { padding: 2px 6px; background: var(--surface2); border-radius: 4px; font-family: var(--font-mono); }
.send-btn {
  width: 44px; height: 44px; border-radius: 50%; border: none;
  background: var(--accent); color: #fff; cursor: pointer; display: flex;
  align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
  transition: all var(--transition);
}
.send-btn:hover { background: var(--accent-hover); transform: scale(1.05); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.send-btn svg { width: 20px; height: 20px; }

/* Command Palette */
.overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  z-index: 1000; display: none; align-items: flex-start; justify-content: center;
  padding-top: 100px;
}
.overlay.open { display: flex; }
.palette {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  width: 560px; max-height: 480px; box-shadow: var(--shadow); display: flex;
  flex-direction: column; animation: paletteIn 0.2s ease;
}
@keyframes paletteIn { from { opacity: 0; transform: scale(0.95) translateY(-10px); } }
.palette-input {
  padding: 16px; border: none; border-bottom: 1px solid var(--border);
  background: transparent; color: var(--text); font-size: 15px; outline: none; width: 100%;
}
.palette-results { overflow-y: auto; flex: 1; padding: 8px; }
.palette-item {
  padding: 12px; border-radius: var(--radius-sm); cursor: pointer;
  transition: all var(--transition); display: flex; align-items: center; gap: 12px;
}
.palette-item:hover, .palette-item.selected { background: var(--accent-bg); }
.palette-item-icon { width: 32px; height: 32px; border-radius: var(--radius-xs); background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.palette-item-content { flex: 1; min-width: 0; }
.palette-item-name { font-size: 14px; font-weight: 500; }
.palette-item-desc { font-size: 12px; color: var(--text2); margin-top: 2px; }
.palette-item-shortcut { font-size: 11px; color: var(--text3); padding: 2px 6px; background: var(--surface2); border-radius: 4px; font-family: var(--font-mono); }
.palette-empty { text-align: center; padding: 40px 20px; color: var(--text2); font-size: 13px; }

/* Settings Drawer */
.drawer-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 998; display: none;
}
.drawer-overlay.open { display: block; }
.drawer {
  position: fixed; top: 0; right: -480px; width: 480px; bottom: 0;
  background: var(--surface); border-left: 1px solid var(--border);
  z-index: 999; transition: right var(--transition); display: flex; flex-direction: column;
}
.drawer.open { right: 0; }
.drawer-header {
  padding: 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.drawer-title { font-size: 18px; font-weight: 600; }
.close-btn {
  width: 32px; height: 32px; border-radius: var(--radius-xs); border: none;
  background: transparent; color: var(--text2); cursor: pointer; display: flex;
  align-items: center; justify-content: center; font-size: 20px; transition: all var(--transition);
}
.close-btn:hover { background: var(--surface2); color: var(--text); }

.drawer-tabs {
  display: flex; border-bottom: 1px solid var(--border); padding: 0 16px;
}
.drawer-tab {
  padding: 12px 16px; border: none; background: none; color: var(--text2);
  font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent;
  transition: all var(--transition); font-weight: 500;
}
.drawer-tab:hover { color: var(--text); }
.drawer-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.drawer-body { flex: 1; overflow-y: auto; padding: 20px; }
.setting-group { margin-bottom: 24px; }
.setting-group-title { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
.setting-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px; border-radius: var(--radius-sm); transition: background var(--transition);
}
.setting-item:hover { background: var(--surface2); }
.setting-label { font-size: 14px; }
.setting-desc { font-size: 12px; color: var(--text2); margin-top: 2px; }
.setting-control select, .setting-control input[type="text"], .setting-control input[type="number"] {
  padding: 8px 12px; border-radius: var(--radius-xs); border: 1px solid var(--border);
  background: var(--bg); color: var(--text); font-size: 13px; outline: none;
  transition: all var(--transition); min-width: 120px;
}
.setting-control select:focus, .setting-control input:focus { border-color: var(--accent); }
.toggle-switch {
  width: 44px; height: 24px; border-radius: 12px; background: var(--border);
  cursor: pointer; position: relative; transition: background var(--transition);
}
.toggle-switch.active { background: var(--accent); }
.toggle-switch::after {
  content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px;
  border-radius: 50%; background: #fff; transition: transform var(--transition);
}
.toggle-switch.active::after { transform: translateX(20px); }

.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.card {
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 16px; transition: all var(--transition);
}
.card:hover { border-color: var(--accent); }
.card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.card-icon { width: 36px; height: 36px; border-radius: var(--radius-xs); background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 16px; }
.card-name { font-size: 14px; font-weight: 500; }
.card-status { font-size: 12px; display: flex; align-items: center; gap: 6px; }
.card-status .dot { width: 6px; height: 6px; border-radius: 50%; }
.card-status .dot.ok { background: var(--green); }
.card-status .dot.err { background: var(--red); }
.card-actions { margin-top: 12px; display: flex; gap: 8px; }
.card-btn {
  flex: 1; padding: 8px; border-radius: var(--radius-xs); border: 1px solid var(--border);
  background: transparent; color: var(--text); font-size: 12px; cursor: pointer;
  transition: all var(--transition); text-align: center;
}
.card-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

/* Toast */
.toast {
  position: fixed; bottom: 24px; right: 24px; padding: 12px 20px;
  border-radius: var(--radius-sm); color: #fff; font-size: 13px; z-index: 2000;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
  box-shadow: var(--shadow);
}
.toast.success { background: var(--green); }
.toast.error { background: var(--red); }
.toast.info { background: var(--accent); }
@keyframes toastIn { from { opacity: 0; transform: translateY(20px); } }
@keyframes toastOut { to { opacity: 0; transform: translateY(20px); } }

/* Mobile Menu */
.mobile-menu-btn { display: none; }
@media (max-width: 768px) {
  .sidebar {
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 1001;
    transform: translateX(-100%);
  }
  .sidebar.open { transform: translateX(0); }
  .mobile-menu-btn { display: flex; }
  .messages { padding: 16px; }
  .input-area { padding: 12px 16px; }
  .palette { width: calc(100% - 32px); margin: 16px; }
  .drawer { width: 100%; right: -100%; }
  .header-toolbar .toolbar-select { max-width: 100px; }
}

/* Loading Skeleton */
.skeleton {
  background: linear-gradient(90deg, var(--surface2) 25%, var(--surface3) 50%, var(--surface2) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: var(--radius-xs);
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* Empty State */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 40px; color: var(--text2); text-align: center;
}
.empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
.empty-title { font-size: 16px; font-weight: 500; margin-bottom: 8px; color: var(--text); }
.empty-desc { font-size: 13px; max-width: 300px; }
</style>
</head>
<body>
<div class="app">
  <!-- Mobile Menu Button -->
  <button class="toolbar-btn mobile-menu-btn" onclick="toggleSidebar()" style="position:fixed;top:12px;left:12px;z-index:1002">
    &#9776;
  </button>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="sidebar-logo">M</div>
        <span class="sidebar-title">MiMo Code</span>
        <span class="sidebar-version" id="versionBadge">v3.0</span>

    <div class="sidebar-footer">

        &#9881; <span>设置</span>
      </button>
      <button class="sidebar-footer-btn" onclick="openPalette()" title="命令面板">
        &#9889; <span>命令</span>

  <!-- Main -->
  <main class="main">

      <div class="header-info">

      <div class="header-toolbar">
        <select class="toolbar-select" id="modelSelect" onchange="switchModel(this.value)" title="模型">
          <option value="">加载中...</option>
        </select>
        <select class="toolbar-select" id="agentSelect" onchange="switchAgent(this.value)" title="代理模式">
          <option value="">加载中...</option>

        <button class="toolbar-btn" onclick="toggleTheme()" title="切换主题">&#9788;</button>
        <button class="toolbar-btn" onclick="openSettings()" title="设置">&#9881;</button>

    <div class="messages-container" id="messagesContainer">
      <div id="messages" class="messages">
        <div class="welcome-screen">
          <div class="welcome-icon">M</div>
          <div class="welcome-title">欢迎使用 MiMo Code</div>
          <div class="welcome-subtitle">AI 驱动的智能助手，帮你处理各种任务</div>
          <div class="welcome-shortcuts">
            <div class="shortcut-item"><kbd>Ctrl+K</kbd> 命令面板</div>
            <div class="shortcut-item"><kbd>Ctrl+N</kbd> 新建会话</div>

          <div class="input-hint">
            <span id="modeHint">Build 模式</span>
            <span><kbd>Shift+Enter</kbd> 换行</span>
          </div>

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        </button>

</div>

<!-- Command Palette -->
<div class="overlay" id="paletteOverlay">

<!-- Settings Drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeSettings()"></div>
<div class="drawer" id="settingsDrawer">

    <button class="drawer-tab active" onclick="switchSettingsTab('general',this)">通用</button>
    <button class="drawer-tab" onclick="switchSettingsTab('providers',this)">提供商</button>
    <button class="drawer-tab" onclick="switchSettingsTab('skills',this)">技能</button>
    <button class="drawer-tab" onclick="switchSettingsTab('stats',this)">统计</button>
  </div>
  <div class="drawer-body" id="settingsBody"></div>

<script>
// ====== State ======
const BASE_PATH = window.location.pathname.replace(/\/+$/, '');
const API = BASE_PATH + '/api';
let sessions = [];
let currentSession = null;
let loading = false;
let commands = [];
let agents = [];
let providers = [];
let connectedProviders = new Set();
let skills = [];
let allSettings = {};
let currentTheme = localStorage.getItem('mimo-theme') || 'default';
let selectedPaletteIndex = 0;

const THEMES = ['default', 'light', 'dracula', 'nord'];
const THEME_NAMES = { default: '深色', light: '浅色', dracula: '德古拉', nord: '北欧' };
const THEME_ICONS = { default: '&#9790;', light: '&#9728;', dracula: '&#128123;', nord: '&#10052;' };

// ====== Helpers ======
const $ = id => document.getElementById(id);
const sleep = ms => new Promise(r => setTimeout(r, ms));

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

async function api(path, opts = {}) {
  const url = API + path;
  const res = await fetch(url, {
    method: opts.method || 'GET',
    headers: opts.body ? { 'Content-Type': 'application/json' } : {},
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok) {
    const text = await res.text();
    let msg = text;
    try { msg = JSON.parse(text).error || JSON.parse(text).message || text; } catch(e) {}
    throw new Error(msg);
  }
  const text = await res.text();
  if (!text) return null;
  try { return JSON.parse(text); } catch(e) { return text; }
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ====== Markdown Renderer ======
function renderMarkdown(text) {
  if (!text) return '';
  let html = escapeHtml(text);

  // Code blocks with language
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
    const langLabel = lang || 'code';
    return `<div class="code-header"><span>${langLabel}</span><button class="copy-code-btn" onclick="copyCode(this)">复制</button></div><pre><code class="language-${lang}">${code}</code></pre>`;
  });

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Headers
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Bold and italic
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Blockquote
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

  // Horizontal rule
  html = html.replace(/^---$/gm, '<hr>');

  // Unordered lists
  html = html.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');

  // Ordered lists
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

  // Links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // Line breaks (but not inside pre)
  html = html.replace(/\n(?![\s\S]*<pre>)/g, '<br>');

  // Clean up multiple br
  html = html.replace(/(<br>){3,}/g, '<br><br>');

  return html;
}

function copyCode(btn) {
  const code = btn.closest('.code-header').nextElementSibling?.querySelector('code');
  if (code) {
    navigator.clipboard.writeText(code.textContent);
    btn.textContent = '已复制';
    setTimeout(() => btn.textContent = '复制', 2000);
  }
}

// ====== Sessions ======
async function loadSessions() {
  try {
    const data = await api('/session');
    sessions = Array.isArray(data) ? data : [];
    renderSessions();
  } catch(e) { console.error('loadSessions:', e); }
}

function renderSessions() {
  const list = $('sessionList');
  const q = $('searchInput').value.toLowerCase();
  const filtered = sessions.filter(s => (s.title || s.slug || '').toLowerCase().includes(q));

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">&#128196;</div><div class="empty-title">暂无会话</div><div class="empty-desc">点击 + 创建新会话</div></div>`;
    return;
  }

  list.innerHTML = filtered.map(s => {
    const id = s.id || s.slug;
    const title = s.title || s.slug || '未命名';
    const active = currentSession && (currentSession.id === id || currentSession.slug === id) ? 'active' : '';
    const time = s.time ? formatTime(s.time.created || s.time) : '';
    const msgCount = s.message_count || s.messages?.length || 0;
    return `<div class="session-item ${active}" onclick="selectSession('${id}')">
      <div class="title">${escapeHtml(title)}</div>
      <div class="meta">
        <span>${time}</span>
        ${msgCount ? `<span>${msgCount} 条消息</span>` : ''}
      </div>
      <button class="delete-btn" onclick="event.stopPropagation();deleteSession('${id}')" title="删除">&#10005;</button>
    </div>`;
  }).join('');
}

function formatTime(time) {
  if (!time) return '';
  const d = new Date(time);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return Math.floor(diff / 60000) + ' 分钟前';
  if (diff < 86400000) return Math.floor(diff / 3600000) + ' 小时前';
  return d.toLocaleDateString();
}

function filterSessions() { renderSessions(); }

async function selectSession(id) {
  try {
    currentSession = sessions.find(s => (s.id || s.slug) === id);
    if (!currentSession) {
      const data = await api('/session/' + id);
      currentSession = data;
    }
    const title = currentSession.title || currentSession.slug || 'Session';
    $('currentTitle').textContent = title;
    $('currentSub').textContent = '会话中';
    $('statusIndicator').className = 'header-status';
    renderSessions();
    await loadMessages();
    $('chatInput').focus();
    closeSidebar();
  } catch(e) { toast('加载会话失败: ' + e.message, 'error'); }
}

async function createSession() {
  try {
    const data = await api('/session', { method: 'POST', body: {} });
    await loadSessions();
    const id = data.id || data.slug;
    if (id) selectSession(id);
    toast('会话已创建', 'success');
  } catch(e) { toast('创建失败: ' + e.message, 'error'); }
}

async function deleteSession(id) {
  if (!confirm('确定要删除这个会话吗？')) return;
  try {
    await api('/session/' + id, { method: 'DELETE' });
    if (currentSession && (currentSession.id === id || currentSession.slug === id)) {
      currentSession = null;
      $('currentTitle').textContent = 'MiMo Code';
      $('currentSub').textContent = '选择一个会话或新建一个';
    }
    await loadSessions();
    toast('会话已删除', 'success');
  } catch(e) { toast('删除失败: ' + e.message, 'error'); }
}

// ====== Messages ======
async function loadMessages() {
  const container = $('messages');
  if (!currentSession) return;

  const sessionId = currentSession.id || currentSession.slug;
  container.innerHTML = '<div class="empty-state"><div class="skeleton" style="width:200px;height:20px;margin-bottom:12px"></div><div class="skeleton" style="width:300px;height:16px"></div></div>';

  try {
    const data = await api('/session/' + sessionId + '/message');
    const msgs = Array.isArray(data) ? data : (data.messages || []);
    renderMessages(msgs);
  } catch(e) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">&#9888;</div><div class="empty-title">加载失败</div><div class="empty-desc">无法加载消息历史</div></div>';
  }
}

function renderMessages(msgs) {
  const container = $('messages');
  if (!msgs || !msgs.length) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-icon">&#128172;</div>
      <div class="empty-title">开始对话</div>
      <div class="empty-desc">输入消息开始与 AI 交流</div>
    </div>`;
    return;
  }

  container.innerHTML = msgs.map(m => renderMessage(m)).join('');
  scrollToBottom();
}

function renderMessage(m) {
  const role = m.role || m.author || 'assistant';
  const parts = m.parts || [{ type: 'text', text: m.content || m.text || '' }];
  const textParts = parts.filter(p => p.type === 'text');
  const toolParts = parts.filter(p => p.type === 'tool_use' || p.type === 'tool_result');
  const content = textParts.map(p => p.text).join('\n');
  const time = m.time ? new Date(m.time).toLocaleTimeString() : '';
  const id = m.id || m.message_id || '';

  let toolHtml = '';
  if (toolParts.length) {
    toolHtml = toolParts.map(t => {
      const name = t.name || t.tool || '工具调用';
      const status = t.status || 'done';
      const content = t.content || t.input || t.output || '';
      return `<div class="tool-call">
        <div class="tool-call-header">
          <span class="tool-call-icon">&#9881;</span>
          <span class="tool-call-name">${escapeHtml(name)}</span>
          <span class="tool-call-status ${status}">${status === 'running' ? '执行中...' : status === 'error' ? '失败' : '完成'}</span>
        </div>
        ${content ? `<div class="tool-call-content">${escapeHtml(typeof content === 'string' ? content : JSON.stringify(content, null, 2))}</div>` : ''}
      </div>`;
    }).join('');
  }

  return `<div class="message ${role}" data-id="${id}">
    <div class="avatar">${role === 'user' ? '&#128100;' : 'M'}</div>
    <div class="content">
      <div class="bubble md-content">${renderMarkdown(content)}${toolHtml}</div>
      <div class="meta">
        <span>${time}</span>
        <div class="actions">
          ${role === 'assistant' ? `<button class="msg-action" onclick="copyMessage(this)">复制</button>` : ''}
          ${role === 'assistant' ? `<button class="msg-action" onclick="retryMessage('${id}')">重试</button>` : ''}
        </div>
      </div>
    </div>
  </div>`;
}

function copyMessage(btn) {
  const bubble = btn.closest('.content')?.querySelector('.bubble');
  if (bubble) {
    const text = bubble.textContent;
    navigator.clipboard.writeText(text);
    btn.textContent = '已复制';
    setTimeout(() => btn.textContent = '复制', 2000);
  }
}

async function retryMessage(id) {
  // Find the last user message before this assistant message
  toast('重试功能开发中', 'info');
}

function scrollToBottom() {
  const container = $('messagesContainer');
  requestAnimationFrame(() => {
    container.scrollTop = container.scrollHeight;
  });
}

// ====== Send Message (Streaming) ======
async function sendMessage() {
  const input = $('chatInput');
  const text = input.value.trim();
  if (!text || loading) return;

  // Auto-create session if none exists
  if (!currentSession) {
    try {
      const data = await api('/session', { method: 'POST', body: {} });
      await loadSessions();
      const id = data.id || data.slug;
      if (id) {
        currentSession = sessions.find(s => (s.id || s.slug) === id);
        $('currentTitle').textContent = currentSession?.title || 'New Session';
        $('currentSub').textContent = '会话中';
        renderSessions();
      }
    } catch(e) {
      toast('创建会话失败: ' + e.message, 'error');
      return;
    }
  }

  const sessionId = currentSession?.id || currentSession?.slug;
  if (!sessionId) return;

  input.value = '';
  autoResize(input);
  loading = true;
  $('sendBtn').disabled = true;

  const container = $('messages');
  const welcome = container.querySelector('.welcome-screen');
  if (welcome) container.innerHTML = '';

  // Add user message
  container.insertAdjacentHTML('beforeend', renderMessage({
    role: 'user',
    text: text,
    time: new Date().toISOString()
  }));
  scrollToBottom();

  // Add typing indicator
  const typingId = 'typing-' + Date.now();
  container.insertAdjacentHTML('beforeend',
    `<div class="message assistant" id="${typingId}">
      <div class="avatar">M</div>
      <div class="content">
        <div class="bubble">
          <div class="typing-indicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>
        </div>
      </div>
    </div>`);
  scrollToBottom();

  try {
    const result = await api('/session/' + sessionId + '/message', {
      method: 'POST',
      body: { message: text, parts: [{ type: 'text', text: text }] },
    });

    const typing = $(typingId);
    if (typing) typing.remove();

    // Extract response text from various response formats
    let reply = '';
    let toolCalls = [];
    if (typeof result === 'string') reply = result;
    else if (result.info && result.parts) {
      reply = result.parts.filter(p => p.type === 'text').map(p => p.text).join('\n');
      toolCalls = result.parts.filter(p => p.type === 'tool_use' || p.type === 'tool_result');
    }
    else if (result.content) reply = result.content;
    else if (result.response) reply = result.response;
    else if (result.message) reply = result.message;
    else if (result.text) reply = result.text;
    else if (result.parts) {
      reply = result.parts.filter(p => p.type === 'text').map(p => p.text).join('\n');
      toolCalls = result.parts.filter(p => p.type === 'tool_use' || p.type === 'tool_result');
    }
    else reply = JSON.stringify(result);

    container.insertAdjacentHTML('beforeend', renderMessage({
      role: 'assistant',
      text: reply,
      parts: toolCalls.length ? [...toolCalls, { type: 'text', text: reply }] : undefined,
      time: new Date().toISOString()
    }));
    scrollToBottom();
    loadSessions();
  } catch(e) {
    const typing = $(typingId);
    if (typing) typing.remove();
    container.insertAdjacentHTML('beforeend',
      `<div class="message assistant">
        <div class="avatar">M</div>
        <div class="content">
          <div class="bubble" style="color:var(--red)">
            <strong>错误:</strong> ${escapeHtml(e.message)}
            <br><button class="msg-action" onclick="retryLastMessage()" style="margin-top:8px">重试</button>
          </div>
        </div>
      </div>`);
  }

  loading = false;
  $('sendBtn').disabled = false;
  input.focus();
}

function retryLastMessage() {
  // Get last user message and resend
  const messages = $('messages').querySelectorAll('.message.user');
  if (messages.length) {
    const lastUser = messages[messages.length - 1];
    const text = lastUser.querySelector('.bubble')?.textContent;
    if (text) {
      $('chatInput').value = text;
      sendMessage();
    }
  }
}

function autoResize(textarea) {
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
}

function handleKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
  if (e.key === 'k' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    openPalette();
  }
  if (e.key === 'n' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    createSession();
  }
}

// ====== Command Palette ======
async function loadCommands() {
  try {
    const data = await api('/command');
    commands = Array.isArray(data) ? data : [];
  } catch(e) { commands = []; }
}

function openPalette() {
  $('paletteOverlay').classList.add('open');
  $('paletteInput').value = '';
  $('paletteInput').focus();
  selectedPaletteIndex = 0;
  filterPalette();
}

function closePalette() {
  $('paletteOverlay').classList.remove('open');
}

function filterPalette() {
  const q = $('paletteInput').value.toLowerCase();
  const results = $('paletteResults');
  const items = commands.filter(c => (c.name || c.command || '').toLowerCase().includes(q));

  if (!items.length) {
    results.innerHTML = '<div class="palette-empty">无匹配命令</div>';
    return;
  }

  results.innerHTML = items.slice(0, 20).map((c, i) =>
    `<div class="palette-item${i === selectedPaletteIndex ? ' selected' : ''}" onclick="executeCommand('${c.command || c.name}')" data-index="${i}">
      <div class="palette-item-icon">&#9889;</div>
      <div class="palette-item-content">
        <div class="palette-item-name">${escapeHtml(c.name || c.command || c)}</div>
        <div class="palette-item-desc">${escapeHtml(c.description || '')}</div>
      </div>
      <div class="palette-item-shortcut">/${c.command || c.name}</div>
    </div>`
  ).join('');
}

function paletteKeydown(e) {
  const items = $('paletteResults').querySelectorAll('.palette-item');
  if (e.key === 'Escape') {
    closePalette();
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    selectedPaletteIndex = Math.min(selectedPaletteIndex + 1, items.length - 1);
    updatePaletteSelection(items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    selectedPaletteIndex = Math.max(selectedPaletteIndex - 1, 0);
    updatePaletteSelection(items);
  } else if (e.key === 'Enter') {
    const sel = items[selectedPaletteIndex];
    if (sel) sel.click();
    closePalette();
  }
}

function updatePaletteSelection(items) {
  items.forEach((item, i) => {
    item.classList.toggle('selected', i === selectedPaletteIndex);
  });
}

function executeCommand(cmd) {
  const input = $('chatInput');
  input.value = cmd.startsWith('/') ? cmd + ' ' : '/' + cmd + ' ';
  input.focus();
  closePalette();
}

// ====== Models & Agents ======
async function loadModels() {
  try {
    const data = await api('/provider');
    providers = Array.isArray(data) ? data : (data.all || []);
    connectedProviders = new Set(data.connected || []);
    const sel = $('modelSelect');
    sel.innerHTML = '<option value="">选择模型...</option>';
    providers.forEach(p => {
      const models = Object.keys(p.models || {});
      models.forEach(m => {
        const connected = connectedProviders.has(p.id);
        sel.innerHTML += `<option value="${m}">${escapeHtml(p.name || '')} / ${escapeHtml(m)}${connected ? '' : ' (未连接)'}</option>`;
      });
    });
    try {
      const config = await api('/config');
      if (config && config.model) sel.value = config.model;
    } catch(e) {}
  } catch(e) { console.error('loadModels:', e); }
}

async function switchModel(model) {
  if (!model) return;
  try {
    await api('/config', { method: 'POST', body: { model } });
    allSettings.model = model;
    toast('模型已切换', 'success');
  } catch(e) { toast('切换失败: ' + e.message, 'error'); }
}

async function loadAgents() {
  try {
    const data = await api('/agent');
    agents = Array.isArray(data) ? data : [];
    const sel = $('agentSelect');
    sel.innerHTML = '<option value="">代理模式...</option>';
    agents.forEach(a => {
      sel.innerHTML += `<option value="${a.name || a.slug}">${escapeHtml(a.name || a.slug)}</option>`;
    });
    if (agents.length) {
      $('modeHint').textContent = `${agents[0].name || 'Build'} 模式`;
    }
  } catch(e) { console.error('loadAgents:', e); }
}

async function switchAgent(agent) {
  if (!agent) return;
  $('modeHint').textContent = `${agent} 模式`;
  try {
    await api('/config', { method: 'POST', body: { agent } });
    allSettings.agent = agent;
    toast('已切换到 ' + agent, 'success');
  } catch(e) { toast('切换失败: ' + e.message, 'error'); }
}

// ====== Skills ======
async function loadSkills() {
  try {
    const data = await api('/skill');
    skills = Array.isArray(data) ? data : (data.skills || []);
  } catch(e) { skills = []; }
}

// ====== Theme ======
function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme === 'default' ? '' : theme);
  currentTheme = theme;
  localStorage.setItem('mimo-theme', theme);
  try { api('/config', { method: 'POST', body: { theme } }); } catch(e) {}
}

function toggleTheme() {
  const idx = THEMES.indexOf(currentTheme);
  const next = THEMES[(idx + 1) % THEMES.length];
  setTheme(next);
  toast(`主题: ${THEME_NAMES[next]}`, 'success');
}

// ====== Settings ======
async function openSettings() {
  $('settingsDrawer').classList.add('open');
  $('drawerOverlay').classList.add('open');
  try { allSettings = await api('/config') || {}; } catch(e) {}
  loadSettingsTab('general');
}

function closeSettings() {
  $('settingsDrawer').classList.remove('open');
  $('drawerOverlay').classList.remove('open');
}

function switchSettingsTab(tab, btn) {
  document.querySelectorAll('#settingsTabs .drawer-tab').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  loadSettingsTab(tab);
}

function loadSettingsTab(tab) {
  const body = $('settingsBody');

  switch(tab) {
    case 'general':
      body.innerHTML = `
        <div class="setting-group">
          <div class="setting-group-title">外观</div>
          <div class="setting-item">
            <div><div class="setting-label">主题</div><div class="setting-desc">界面主题颜色</div></div>
            <div class="setting-control">
              <select onchange="setTheme(this.value)">
                ${THEMES.map(t => `<option value="${t}" ${currentTheme === t ? 'selected' : ''}>${THEME_NAMES[t]}</option>`).join('')}
              </select>
            </div>
          </div>
        </div>
        <div class="setting-group">
          <div class="setting-group-title">模型</div>
          <div class="setting-item">
            <div><div class="setting-label">AI 模型</div><div class="setting-desc">选择使用的 AI 模型</div></div>
            <div class="setting-control">
              <select onchange="switchModel(this.value)">
                ${providers.reduce((acc, p) => acc.concat(Object.keys(p.models || {})), []).map(m =>
                  `<option value="${m}" ${allSettings.model === m ? 'selected' : ''}>${escapeHtml(m)}</option>`
                ).join('')}
              </select>
            </div>
          </div>
          <div class="setting-item">
            <div><div class="setting-label">代理模式</div><div class="setting-desc">AI 交互模式</div></div>
            <div class="setting-control">
              <select onchange="switchAgent(this.value)">
                ${agents.map(a => `<option value="${a.name || a.slug}" ${(allSettings.agent || '') === (a.name || a.slug) ? 'selected' : ''}>${escapeHtml(a.name || a.slug)}</option>`).join('')}
              </select>
            </div>
          </div>
        </div>
        <div class="setting-group">
          <div class="setting-group-title">关于</div>
          <div class="setting-item">
            <div><div class="setting-label">版本</div><div class="setting-desc">MiMo Auto</div></div>
            <div class="setting-control"><span style="font-size:13px;color:var(--text2)">v3.0.0</span></div>
          </div>
        </div>`;
      break;

    case 'providers':
      body.innerHTML = `<div class="card-grid">
        ${providers.map(p => {
          const isConnected = connectedProviders.has(p.id);
          const modelCount = Object.keys(p.models || {}).length;
          return `<div class="card">
            <div class="card-header">
              <div class="card-icon">${isConnected ? '&#9989;' : '&#10060;'}</div>
              <div class="card-name">${escapeHtml(p.name || '未知')}</div>
            </div>
            <div class="card-status">
              <span class="dot ${isConnected ? 'ok' : 'err'}"></span>
              <span>${isConnected ? '已连接' : '未连接'}</span>
              <span style="color:var(--text3)">&middot; ${modelCount} 个模型</span>
            </div>
            <div class="card-actions">
              ${p.auth_url ? `<button class="card-btn" onclick="window.open('${escapeHtml(p.auth_url)}','oauth','width=600,height=700')">授权</button>` : ''}
            </div>
          </div>`;
        }).join('')}
      </div>`;
      break;

    case 'skills':
      body.innerHTML = skills.length ? `<div class="card-grid">
        ${skills.map(s => `
          <div class="card">
            <div class="card-header">
              <div class="card-icon">&#128218;</div>
              <div class="card-name">${escapeHtml(s.name || '技能')}</div>
            </div>
            <div class="setting-desc">${escapeHtml(s.description || '无描述')}</div>
          </div>
        `).join('')}
      </div>` : '<div class="empty-state"><div class="empty-icon">&#128218;</div><div class="empty-title">暂无技能</div></div>';
      break;

    case 'stats':
      body.innerHTML = `
        <div class="setting-group">
          <div class="setting-group-title">数据统计</div>
          <div class="setting-item">
            <div class="setting-label">会话数</div>
            <div class="setting-control"><span style="font-size:20px;font-weight:600">${sessions.length}</span></div>
          </div>
          <div class="setting-item">
            <div class="setting-label">提供商</div>
            <div class="setting-control"><span style="font-size:20px;font-weight:600">${providers.length}</span></div>
          </div>
          <div class="setting-item">
            <div class="setting-label">命令数</div>
            <div class="setting-control"><span style="font-size:20px;font-weight:600">${commands.length}</span></div>
          </div>
          <div class="setting-item">
            <div class="setting-label">技能数</div>
            <div class="setting-control"><span style="font-size:20px;font-weight:600">${skills.length}</span></div>
          </div>
        </div>`;
      break;
  }
}

// ====== Sidebar Mobile ======
function toggleSidebar() {
  $('sidebar').classList.toggle('open');
}

function closeSidebar() {
  $('sidebar').classList.remove('open');
}

// ====== Init ======
async function init() {
  // Load theme
  setTheme(currentTheme);

  // Load data in parallel
  await Promise.all([
    loadSessions(),
    loadModels(),
    loadAgents(),
    loadCommands(),
    loadSkills(),
  ]);

  // Periodic refresh
  setInterval(loadSessions, 30000);

  // Focus input
  $('chatInput').focus();
}

// Event listeners
$('paletteOverlay').addEventListener('click', (e) => {
  if (e.target === $('paletteOverlay')) closePalette();
});

// Global keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if ($('paletteOverlay').classList.contains('open')) closePalette();
    if ($('settingsDrawer').classList.contains('open')) closeSettings();
  }
});

init();
</script>
</body>
</html>
